<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA-ive Wallpaper Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --md-sys-color-primary: #c7bfff;
            --md-sys-color-on-primary: #2f285f;
            --md-sys-color-primary-container: #463f77;
            --md-sys-color-on-primary-container: #e5deff;
            --md-sys-color-secondary: #c8c3dc;
            --md-sys-color-on-secondary: #312e41;
            --md-sys-color-secondary-container: #474459;
            --md-sys-color-on-secondary-container: #e5dff9;
            --md-sys-color-surface: #141318;
            --md-sys-color-on-surface: #e5e1e9;
            --md-sys-color-surface-variant: #47464f;
            --md-sys-color-on-surface-variant: #c9c5d0;
            --md-sys-color-outline: #928f99;
            --md-sys-color-surface-container: #201f25;
            --md-sys-color-surface-container-high: #2a292f;
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .m3-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        .m3-card:hover {
            background-color: var(--md-sys-color-surface-container-high);
            transform: translateY(-4px);
        }

        .skeleton {
            background: linear-gradient(90deg, #201f25 25%, #2a292f 50%, #201f25 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--md-sys-color-surface); }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: var(--md-sys-color-surface-variant); 
            border-radius: 10px;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        m3: {
                            primary: '#c7bfff',
                            onPrimary: '#2f285f',
                            primaryContainer: '#463f77',
                            onPrimaryContainer: '#e5deff',
                            secondary: '#c8c3dc',
                            onSecondary: '#312e41',
                            secondaryContainer: '#474459',
                            onSecondaryContainer: '#e5dff9',
                            surface: '#141318',
                            onSurface: '#e5e1e9',
                            surfaceVariant: '#47464f',
                            onSurfaceVariant: '#c9c5d0',
                            outline: '#928f99',
                            surfaceContainer: '#201f25',
                            surfaceContainerHigh: '#2a292f',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body x-data="galleryApp()" class="custom-scrollbar overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-m3-surface/90 backdrop-blur-xl border-b border-m3-surfaceVariant/30 py-6">
        <div class="container mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
            <h1 class="text-2xl font-medium tracking-tight text-m3-onSurface">
                NA-ive Wallpaper Collection
            </h1>
            
            <div class="flex flex-wrap items-center gap-4 w-full md:w-auto">
                <!-- Search Input M3 Style -->
                <div class="relative flex-grow md:w-80 group">
                    <input type="text" x-model="search" placeholder="Search wallpapers..." 
                        class="w-full bg-m3-surfaceContainerHigh text-m3-onSurface border-none rounded-full py-3 px-12 focus:ring-2 focus:ring-m3-primary transition-all placeholder:text-m3-onSurfaceVariant/50">
                    <i class="fa fa-search absolute left-5 top-1/2 -translate-y-1/2 text-m3-onSurfaceVariant"></i>
                </div>

                <!-- Custom Dropdown -->
                <div class="relative" x-data="{ open: false }" @click.away="open = false">
                    <button @click="open = !open" 
                        class="flex items-center gap-2 bg-m3-secondaryContainer text-m3-onSecondaryContainer px-6 py-3 rounded-full font-medium hover:opacity-90 transition-opacity">
                        <span x-text="sortLabel()"></span>
                        <i class="fa fa-chevron-down text-xs transition-transform" :class="open ? 'rotate-180' : ''"></i>
                    </button>
                    
                    <div x-show="open" x-cloak
                        x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0 scale-95"
                        x-transition:enter-end="opacity-100 scale-100"
                        class="absolute right-0 mt-2 w-48 bg-m3-surfaceContainerHigh border border-m3-surfaceVariant/30 rounded-2xl shadow-2xl overflow-hidden z-50">
                        <template x-for="option in sortOptions">
                            <button @click="sortOrder = option.value; open = false" 
                                class="w-full text-left px-5 py-3 hover:bg-m3-primary/10 text-m3-onSurface transition-colors text-sm"
                                :class="sortOrder === option.value ? 'bg-m3-primary/20 text-m3-primary font-bold' : ''"
                                x-text="option.label">
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Gallery Grid -->
    <main class="container mx-auto px-6 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Skeleton State -->
            <template x-if="loading">
                <template x-for="i in 8">
                    <div class="m3-card aspect-[16/10] skeleton"></div>
                </template>
            </template>

            <!-- Real Content -->
            <template x-for="wp in filteredWallpapers()" :key="wp.filename">
                <div class="m3-card group overflow-hidden flex flex-col" x-data="{ imgLoaded: false }">
                    <!-- Image Container -->
                    <div class="aspect-[16/10] w-full relative overflow-hidden cursor-pointer" @click="openLightbox(wp)">
                        <!-- Skeleton for each image -->
                        <div x-show="!imgLoaded" class="absolute inset-0 skeleton"></div>
                        
                        <img :src="wp.filename" :alt="wp.filename" 
                            decoding="async"
                            loading="lazy"
                            @load="imgLoaded = true"
                            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
                            :class="imgLoaded ? 'opacity-100' : 'opacity-0'">
                    </div>

                    <!-- Info Area -->
                    <div class="p-5 flex items-center justify-between">
                        <div class="flex flex-col max-w-[70%]">
                            <span class="text-sm font-medium text-m3-onSurface truncate" x-text="cleanName(wp.filename)"></span>
                            <span class="text-[10px] text-m3-onSurfaceVariant uppercase tracking-widest mt-1" x-text="formatDate(wp.mtime)"></span>
                        </div>
                        <div class="flex gap-1">
                            <template x-if="wp.wallhaven_id">
                                <a :href="'https://wallhaven.cc/w/' + wp.wallhaven_id" target="_blank" 
                                    class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-m3-primaryContainer text-m3-primary transition-colors" title="Wallhaven">
                                    <i class="fa-solid fa-link text-sm"></i>
                                </a>
                            </template>
                            <a :href="wp.filename" download 
                                class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-m3-secondaryContainer text-m3-secondary transition-colors" title="Download">
                                <i class="fa fa-download text-sm"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="!loading && filteredWallpapers().length === 0" class="text-center py-32" x-cloak>
            <div class="bg-m3-surfaceContainer p-10 rounded-[40px] inline-block">
                <i class="fa-solid fa-folder-open text-5xl text-m3-outline/30 mb-6 block"></i>
                <p class="text-m3-onSurfaceVariant text-lg">No wallpapers found matches your search.</p>
            </div>
        </div>
    </main>

    <!-- Lightbox (M3 Dialog Style) -->
    <div x-show="lightboxOpen" 
        class="fixed inset-0 z-50 flex items-center justify-center bg-m3-surface/95 backdrop-blur-sm p-4 md:p-10"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        @keydown.escape.window="closeLightbox()"
        x-cloak>
        
        <button @click="closeLightbox()" class="absolute top-8 right-8 w-12 h-12 flex items-center justify-center bg-m3-surfaceContainerHigh rounded-full text-m3-onSurface hover:bg-m3-surfaceVariant transition-colors z-50">
            <i class="fa fa-times text-xl"></i>
        </button>

        <div class="relative max-w-7xl max-h-full flex flex-col items-center">
            <img :src="currentWp?.filename" class="max-w-full max-h-[80vh] object-contain rounded-3xl shadow-2xl border border-m3-surfaceVariant/20">
            
            <div class="mt-8 flex flex-wrap items-center justify-center gap-4 bg-m3-surfaceContainerHigh/80 backdrop-blur px-8 py-4 rounded-[32px] border border-m3-surfaceVariant/30">
                 <div class="flex flex-col">
                     <span class="text-sm font-bold text-m3-onSurface" x-text="currentWp?.filename"></span>
                     <span class="text-[10px] text-m3-onSurfaceVariant" x-text="formatDate(currentWp?.mtime)"></span>
                 </div>
                 <div class="h-8 w-px bg-m3-surfaceVariant/50 mx-2"></div>
                 <a :href="currentWp?.filename" download class="bg-m3-primary text-m3-onPrimary px-6 py-2 rounded-full font-bold text-sm hover:opacity-90 transition-opacity">
                    Download
                 </a>
                 <template x-if="currentWp?.wallhaven_id">
                    <a :href="'https://wallhaven.cc/w/' + currentWp?.wallhaven_id" target="_blank" class="bg-m3-secondaryContainer text-m3-onSecondaryContainer px-6 py-2 rounded-full font-bold text-sm hover:opacity-90 transition-opacity">
                        View Wallhaven
                    </a>
                 </template>
            </div>
        </div>
    </div>

    <script>
        function galleryApp() {
            return {
                wallpapers: [],
                search: '',
                sortOrder: 'newest',
                loading: true,
                lightboxOpen: false,
                currentWp: null,
                sortOptions: [
                    { label: 'Newest First', value: 'newest' },
                    { label: 'Oldest First', value: 'oldest' },
                    { label: 'Name A-Z', value: 'az' },
                    { label: 'Name Z-A', value: 'za' }
                ],

                init() {
                    setTimeout(() => {
                        fetch('wallpapers.json')
                            .then(res => res.json())
                            .then(data => {
                                this.wallpapers = data;
                                this.loading = false;
                            });
                    }, 800); // Small delay to show off M3 skeleton
                },

                sortLabel() {
                    return this.sortOptions.find(o => o.value === this.sortOrder).label;
                },

                filteredWallpapers() {
                    let result = this.wallpapers.filter(wp => 
                        wp.filename.toLowerCase().includes(this.search.toLowerCase())
                    );

                    if (this.sortOrder === 'newest') {
                        result.sort((a, b) => new Date(b.mtime) - new Date(a.mtime));
                    } else if (this.sortOrder === 'oldest') {
                        result.sort((a, b) => new Date(a.mtime) - new Date(b.mtime));
                    } else if (this.sortOrder === 'az') {
                        result.sort((a, b) => a.filename.localeCompare(b.filename));
                    } else if (this.sortOrder === 'za') {
                        result.sort((a, b) => b.filename.localeCompare(a.filename));
                    }

                    return result;
                },

                cleanName(name) {
                    // Extract name without extension and clean up
                    let base = name.split('.')[0];
                    return base.length > 20 ? base.substring(0, 18) + '...' : base;
                },

                formatDate(isoString) {
                    if (!isoString) return '';
                    const date = new Date(isoString);
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                },

                openLightbox(wp) {
                    this.currentWp = wp;
                    this.lightboxOpen = true;
                    document.body.style.overflow = 'hidden';
                },

                closeLightbox() {
                    this.lightboxOpen = false;
                    document.body.style.overflow = 'auto';
                }
            }
        }
    </script>
</body>
</html>
