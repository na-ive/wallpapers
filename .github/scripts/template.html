<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA-ive Wallpaper Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --md-sys-color-primary: #c7bfff;
            --md-sys-color-on-primary: #2f285f;
            --md-sys-color-primary-container: #463f77;
            --md-sys-color-on-primary-container: #e5deff;
            --md-sys-color-secondary: #c8c3dc;
            --md-sys-color-on-secondary: #312e41;
            --md-sys-color-secondary-container: #474459;
            --md-sys-color-on-secondary-container: #e5dff9;
            --md-sys-color-surface: #141318;
            --md-sys-color-on-surface: #e5e1e9;
            --md-sys-color-surface-variant: #47464f;
            --md-sys-color-on-surface-variant: #c9c5d0;
            --md-sys-color-outline: #928f99;
            --md-sys-color-surface-container: #201f25;
            --md-sys-color-surface-container-high: #2a292f;
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .m3-transition {
            transition: all 0.5s cubic-bezier(0.2, 0, 0, 1);
        }

        .m3-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 24px;
            will-change: transform, border-radius;
        }

        .m3-card:hover {
            background-color: var(--md-sys-color-surface-container-high);
            transform: translateY(-4px);
        }

        .skeleton {
            background: linear-gradient(90deg, #201f25 25%, #2a292f 50%, #201f25 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--md-sys-color-surface); }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: var(--md-sys-color-surface-variant); 
            border-radius: 10px;
        }

        /* Pill Button Transition Fix: Using 4xl instead of full */
        .pill-btn {
            transition: all 0.5s cubic-bezier(0.2, 0, 0, 1) !important;
        }
        .pill-btn:hover, .pill-btn.active {
            border-radius: 2rem !important; /* 4xl equivalent */
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Improved Zoom Logic */
        .zoom-container {
            cursor: zoom-in;
            transition: all 0.5s cubic-bezier(0.2, 0, 0, 1);
        }
        .zoom-container.zoomed {
            cursor: zoom-out;
            width: 150vw;
            height: 150vh;
            max-width: none;
            max-height: none;
        }
        .zoom-container img {
            width: 100%;
            height: 100%;
            object-contain: contain;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        m3: {
                            primary: '#c7bfff',
                            onPrimary: '#2f285f',
                            primaryContainer: '#463f77',
                            onPrimaryContainer: '#e5deff',
                            secondary: '#c8c3dc',
                            onSecondary: '#312e41',
                            secondaryContainer: '#474459',
                            onSecondaryContainer: '#e5dff9',
                            surface: '#141318',
                            onSurface: '#e5e1e9',
                            surfaceVariant: '#47464f',
                            onSurfaceVariant: '#c9c5d0',
                            outline: '#928f99',
                            surfaceContainer: '#201f25',
                            surfaceContainerHigh: '#2a292f',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body x-data="galleryApp()" class="custom-scrollbar overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-m3-surface/80 backdrop-blur-md border-b border-m3-surfaceVariant/20 py-3 md:py-4">
        <div class="container mx-auto px-4 flex items-center justify-between h-10 md:h-12">
            
            <div class="flex items-center gap-2 md:gap-3 shrink-0" x-show="!searchOpen">
                <i class="fa-solid fa-images text-m3-onSurface text-lg md:text-xl"></i>
                <h1 class="text-base md:text-xl font-semibold text-m3-onSurface whitespace-nowrap">
                    <span class="md:hidden">NAWC</span>
                    <span class="hidden md:inline">NA-ive Wallpaper Collection</span>
                </h1>
            </div>

            <div class="flex items-center gap-2 md:gap-4 flex-grow justify-end" :class="searchOpen ? 'w-full' : ''">
                
                <div class="relative flex items-center m3-transition" :class="searchOpen ? 'w-full' : 'w-auto'">
                    <div class="hidden md:block relative w-64">
                        <input type="text" x-model="search" placeholder="Search..." 
                            class="w-full bg-m3-surfaceContainerHigh text-m3-onSurface border-none rounded-xl py-2 px-10 focus:ring-2 focus:ring-m3-primary m3-transition text-sm">
                        <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-m3-onSurfaceVariant/70 text-xs"></i>
                    </div>

                    <div class="md:hidden flex items-center gap-2 w-full" x-show="searchOpen" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0">
                        <button @click="searchOpen = false; search = ''" class="p-2 text-m3-onSurfaceVariant m3-transition hover:text-m3-onSurface">
                            <i class="fa fa-arrow-left"></i>
                        </button>
                        <input type="text" x-model="search" placeholder="Search wallpapers..." autofocus
                            class="w-full bg-m3-surfaceContainerHigh text-m3-onSurface border-none rounded-xl py-2 px-4 focus:ring-2 focus:ring-m3-primary text-sm m3-transition">
                    </div>
                    <button @click="searchOpen = true" x-show="!searchOpen" class="md:hidden p-2 text-m3-onSurface m3-transition hover:bg-m3-surfaceVariant/20 rounded-full">
                        <i class="fa fa-search"></i>
                    </button>
                </div>

                <div class="flex items-center gap-1 md:gap-4 shrink-0" x-show="!searchOpen">
                    <div class="flex items-center">
                        <div class="hidden md:flex gap-1 no-scrollbar overflow-x-auto">
                            <template x-for="(option, index) in sortOptions" :key="option.value">
                                <button 
                                    @click="sortOrder = option.value"
                                    class="pill-btn whitespace-nowrap px-4 py-2 text-xs font-semibold m3-transition"
                                    :class="{
                                        'bg-m3-secondaryContainer text-m3-onSecondaryContainer active shadow-md': sortOrder === option.value,
                                        'bg-m3-surfaceVariant/20 text-m3-onSurfaceVariant': sortOrder !== option.value,
                                        'rounded-l-2xl rounded-r-md': index === 0 && sortOrder !== option.value,
                                        'rounded-r-2xl rounded-l-md': index === sortOptions.length - 1 && sortOrder !== option.value,
                                        'rounded-md': index !== 0 && index !== sortOptions.length - 1 && sortOrder !== option.value
                                    }"
                                    x-text="option.label">
                                </button>
                            </template>
                        </div>

                        <div class="md:hidden relative" x-data="{ open: false }">
                            <button @click="open = !open" class="p-2 text-m3-onSurface m3-transition hover:bg-m3-surfaceVariant/20 rounded-full">
                                <i class="fa-solid fa-arrow-down-wide-short"></i>
                            </button>
                            <div x-show="open" @click.away="open = false" x-cloak
                                x-transition:enter="transition ease-out duration-300"
                                x-transition:enter-start="opacity-0 scale-95"
                                x-transition:enter-end="opacity-100 scale-100"
                                x-transition:leave="transition ease-in duration-200"
                                x-transition:leave-start="opacity-100 scale-100"
                                x-transition:leave-end="opacity-0 scale-95"
                                class="absolute right-0 mt-2 w-40 bg-m3-surfaceContainerHigh border border-m3-surfaceVariant/30 rounded-2xl shadow-2xl z-50 overflow-hidden text-center">
                                <div class="py-2">
                                    <template x-for="option in sortOptions" :key="option.value">
                                        <button @click="sortOrder = option.value; open = false" 
                                            class="w-full text-left px-4 py-3 text-sm text-m3-onSurface hover:bg-m3-primary/10 m3-transition"
                                            :class="sortOrder === option.value ? 'bg-m3-primary/20 text-m3-primary font-bold' : ''"
                                            x-text="option.label">
                                        </button>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button @click="openRandom()" 
                        class="pill-btn whitespace-nowrap flex items-center justify-center m3-transition h-9 w-9 md:w-auto md:px-4 md:py-2 bg-transparent md:bg-m3-primaryContainer text-m3-onSurface md:text-m3-onPrimaryContainer rounded-full md:rounded-md hover:bg-m3-surfaceVariant/20 md:hover:bg-m3-primaryContainer active:scale-90"
                        title="Surprise Me!">
                        <i class="fa-solid fa-dice-five md:mr-2 text-lg"></i>
                        <span class="hidden md:inline text-xs font-semibold text-center">Surprise Me</span>
                    </button>
                </div>

            </div>
        </div>
    </header>

    <!-- Gallery Grid -->
    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6">
            <template x-if="loading">
                <template x-for="i in 8">
                    <div class="m3-card aspect-video skeleton"></div>
                </template>
            </template>

            <template x-for="wp in filteredWallpapers()" :key="wp.filename">
                <div class="m3-card group overflow-hidden flex flex-col m3-transition relative">
                    <div class="aspect-video w-full relative overflow-hidden cursor-pointer bg-m3-surfaceVariant/10" @click="openLightbox(wp)">
                        <!-- Color Swatch Tag -->
                        <div class="absolute top-3 left-3 z-10 flex items-center gap-1.5 bg-black/30 backdrop-blur-md px-2 py-1 rounded-full border border-white/10" title="Dominant Color">
                            <div class="w-2 h-2 rounded-full shadow-sm" :style="'background-color: ' + wp.color"></div>
                            <span class="text-[8px] font-bold text-white/90 uppercase tracking-tighter" x-text="wp.color"></span>
                        </div>
                        
                        <img :src="wp.thumbnail" :alt="wp.filename" 
                            decoding="async" loading="lazy"
                            class="w-full h-full object-cover m3-transition group-hover:scale-105">
                    </div>
                    <div class="p-3 md:p-4 flex items-center justify-between gap-2">
                        <span class="text-[10px] md:text-xs font-medium text-m3-onSurface truncate flex-grow" x-text="cleanName(wp.filename)"></span>
                        <div class="flex gap-1 shrink-0">
                            <template x-if="wp.wallhaven_id">
                                <a :href="'https://wallhaven.cc/w/' + wp.wallhaven_id" target="_blank" 
                                    class="w-8 h-8 flex items-center justify-center rounded-lg bg-m3-secondaryContainer/30 text-m3-onSecondaryContainer hover:bg-m3-primary/20 hover:text-m3-primary m3-transition text-xs" title="Wallhaven">
                                    <i class="fa-solid fa-link"></i>
                                </a>
                            </template>
                            <a :href="wp.filename" download 
                                class="w-8 h-8 flex items-center justify-center rounded-lg bg-m3-secondaryContainer/30 text-m3-onSecondaryContainer hover:bg-m3-primary/20 hover:text-m3-primary m3-transition text-xs" title="Download">
                                <i class="fa fa-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Footer -->
        <div x-show="!loading && filteredWallpapers().length > 0" class="mt-12 mb-8 flex flex-col items-center gap-2 py-4" x-cloak>
            <p class="text-m3-onSurfaceVariant/40 text-sm font-medium italic text-center px-4">That's all for now! More wallpapers are coming soon.</p>
            <a href="https://github.com/na-ive/wallpapers" target="_blank" 
                class="flex items-center gap-2 px-4 py-2 text-m3-onSurfaceVariant/60 hover:text-m3-primary m3-transition text-xs font-bold">
                <i class="fa-brands fa-github text-base"></i>
                <span>Give this repo a star</span>
            </a>
        </div>
    </main>

    <!-- Lightbox -->
    <div x-show="lightboxOpen" 
        class="fixed inset-0 z-50 flex items-center justify-center bg-m3-surface/70 backdrop-blur-sm p-4 md:p-8"
        x-transition:enter="transition cubic-bezier(0.2, 0, 0, 1) duration-500"
        x-transition:enter-start="opacity-0 backdrop-blur-none scale-95"
        x-transition:enter-end="opacity-100 backdrop-blur-sm scale-100"
        x-transition:leave="transition cubic-bezier(0.2, 0, 0, 1) duration-400"
        x-transition:leave-start="opacity-100 backdrop-blur-sm scale-100"
        x-transition:leave-end="opacity-0 backdrop-blur-none scale-95"
        @click.self="closeLightbox()"
        @keydown.escape.window="closeLightbox()"
        x-cloak>
        
        <div class="relative max-w-full w-full h-full flex flex-col items-center justify-center overflow-hidden" @click.self="closeLightbox()">
            
            <div class="relative overflow-auto custom-scrollbar max-w-[95vw] max-h-[85vh] rounded-2xl shadow-2xl flex items-center justify-center bg-black/20" x-data="{ zoomed: false }" @click.self="closeLightbox()">
                <div class="zoom-container" :class="zoomed ? 'zoomed' : ''" @click="zoomed = !zoomed">
                    <img :src="currentWp?.filename" 
                        class="object-contain m3-transition shadow-2xl">
                </div>
            </div>
            
            <div class="mt-4 md:mt-6 flex items-center gap-2 bg-m3-surfaceContainerHigh/90 backdrop-blur-xl px-4 py-3 md:px-6 md:py-4 rounded-[28px] border border-m3-outline/20 shadow-2xl m3-transition">
                 <div class="flex flex-col mr-2 md:mr-4 overflow-hidden max-w-[100px] sm:max-w-[300px]">
                     <span class="text-[10px] md:text-xs font-bold text-m3-onSurface truncate" x-text="currentWp?.filename"></span>
                 </div>
                 <div class="flex items-center gap-2">
                     <a :href="currentWp?.filename" download class="bg-m3-primary text-m3-onPrimary px-4 py-2 md:px-6 md:py-2.5 rounded-2xl font-bold text-[10px] md:text-xs hover:scale-105 active:scale-95 m3-transition shadow-lg text-center">
                        Download
                     </a>
                     <template x-if="currentWp?.wallhaven_id">
                        <a :href="'https://wallhaven.cc/w/' + currentWp?.wallhaven_id" target="_blank" class="bg-m3-secondaryContainer text-m3-onSecondaryContainer px-4 py-2 md:px-6 md:py-2.5 rounded-2xl font-bold text-[10px] md:text-xs hover:scale-105 active:scale-95 m3-transition border border-m3-outline/10 text-center">
                            Wallhaven
                        </a>
                     </template>
                 </div>
            </div>
        </div>
    </div>

    <script>
        function galleryApp() {
            return {
                wallpapers: [],
                search: '',
                sortOrder: 'newest',
                loading: true,
                lightboxOpen: false,
                searchOpen: false,
                currentWp: null,
                sortOptions: [
                    { label: 'Newest', value: 'newest' },
                    { label: 'Oldest', value: 'oldest' },
                    { label: 'A-Z', value: 'az' },
                    { label: 'Z-A', value: 'za' }
                ],

                init() {
                    fetch('wallpapers.json')
                        .then(res => res.json())
                        .then(data => {
                            this.wallpapers = data;
                            this.loading = false;
                        });
                },

                filteredWallpapers() {
                    let result = this.wallpapers.filter(wp => 
                        wp.filename.toLowerCase().includes(this.search.toLowerCase())
                    );

                    if (this.sortOrder === 'newest') {
                        result.sort((a, b) => new Date(b.mtime) - new Date(a.mtime));
                    } else if (this.sortOrder === 'oldest') {
                        result.sort((a, b) => new Date(a.mtime) - new Date(b.mtime));
                    } else if (this.sortOrder === 'az') {
                        result.sort((a, b) => a.filename.localeCompare(b.filename));
                    } else if (this.sortOrder === 'za') {
                        result.sort((a, b) => b.filename.localeCompare(a.filename));
                    }

                    return result;
                },

                cleanName(name) {
                    let base = name.replace(/\.[^/.]+$/, "");
                    return base.length > 30 ? base.substring(0, 28) + '...' : base;
                },

                openLightbox(wp) {
                    this.currentWp = wp;
                    this.lightboxOpen = true;
                    document.body.style.overflow = 'hidden';
                },

                openRandom() {
                    if (this.wallpapers.length > 0) {
                        const randomIndex = Math.floor(Math.random() * this.wallpapers.length);
                        this.openLightbox(this.wallpapers[randomIndex]);
                    }
                },

                closeLightbox() {
                    this.lightboxOpen = false;
                    document.body.style.overflow = 'auto';
                }
            }
        }
    </script>
</body>
</html>
