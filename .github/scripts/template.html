<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA-ive Wallpaper Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --md-sys-color-primary: #c7bfff;
            --md-sys-color-on-primary: #2f285f;
            --md-sys-color-primary-container: #463f77;
            --md-sys-color-on-primary-container: #e5deff;
            --md-sys-color-secondary: #c8c3dc;
            --md-sys-color-on-secondary: #312e41;
            --md-sys-color-secondary-container: #474459;
            --md-sys-color-on-secondary-container: #e5dff9;
            --md-sys-color-surface: #141318;
            --md-sys-color-on-surface: #e5e1e9;
            --md-sys-color-surface-variant: #47464f;
            --md-sys-color-on-surface-variant: #c9c5d0;
            --md-sys-color-outline: #928f99;
            --md-sys-color-surface-container: #201f25;
            --md-sys-color-surface-container-high: #2a292f;
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* M3 Card: Extra Large Rounding (28px) */
        .m3-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
            border: 1px solid transparent;
        }

        .m3-card:hover {
            background-color: var(--md-sys-color-surface-container-high);
            transform: scale(1.02);
            border-color: var(--md-sys-color-surface-variant);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .skeleton {
            background: linear-gradient(90deg, #201f25 25%, #2a292f 50%, #201f25 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Segmented Button Styling */
        .segmented-btn {
            @apply flex items-center justify-center px-4 py-2 text-sm font-medium transition-all border-y border-m3-outline/30;
        }
        .segmented-btn-active {
            @apply bg-m3-secondaryContainer text-m3-onSecondaryContainer !border-m3-outline/0;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--md-sys-color-surface); }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: var(--md-sys-color-surface-variant); 
            border-radius: 20px;
            border: 2px solid var(--md-sys-color-surface);
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        m3: {
                            primary: '#c7bfff',
                            onPrimary: '#2f285f',
                            primaryContainer: '#463f77',
                            onPrimaryContainer: '#e5deff',
                            secondary: '#c8c3dc',
                            onSecondary: '#312e41',
                            secondaryContainer: '#474459',
                            onSecondaryContainer: '#e5dff9',
                            surface: '#141318',
                            onSurface: '#e5e1e9',
                            surfaceVariant: '#47464f',
                            onSurfaceVariant: '#c9c5d0',
                            outline: '#928f99',
                            surfaceContainer: '#201f25',
                            surfaceContainerHigh: '#2a292f',
                        }
                    },
                    borderRadius: {
                        'm3-xl': '28px',
                        'm3-lg': '24px',
                        'm3-md': '16px',
                    }
                }
            }
        }
    </script>
</head>
<body x-data="galleryApp()" class="custom-scrollbar overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-m3-surface/90 backdrop-blur-xl py-8">
        <div class="container mx-auto px-6 flex flex-col items-center gap-8">
            <h1 class="text-3xl font-medium tracking-tight text-m3-onSurface">
                NA-ive Wallpaper Collection
            </h1>
            
            <div class="flex flex-col md:flex-row items-center gap-6 w-full max-w-4xl">
                <!-- Search Input M3 Style -->
                <div class="relative flex-grow w-full group">
                    <input type="text" x-model="search" placeholder="Search wallpapers..." 
                        class="w-full bg-m3-surfaceContainerHigh text-m3-onSurface border-none rounded-2xl py-4 px-14 focus:ring-2 focus:ring-m3-primary transition-all placeholder:text-m3-onSurfaceVariant/50 shadow-inner">
                    <i class="fa fa-search absolute left-6 top-1/2 -translate-y-1/2 text-m3-onSurfaceVariant text-lg"></i>
                </div>

                <!-- Segmented Button for Sorting -->
                <div class="flex items-stretch h-14 bg-m3-surfaceContainer rounded-2xl overflow-hidden border border-m3-outline/20 p-1 shadow-sm">
                    <template x-for="(option, index) in sortOptions" :key="option.value">
                        <button 
                            @click="sortOrder = option.value"
                            class="relative flex items-center justify-center px-5 py-2 text-xs font-semibold transition-all duration-300"
                            :class="{
                                'bg-m3-secondaryContainer text-m3-onSecondaryContainer rounded-xl shadow-sm': sortOrder === option.value,
                                'text-m3-onSurfaceVariant hover:bg-m3-surfaceVariant/20': sortOrder !== option.value,
                                'border-r border-m3-outline/10': index !== sortOptions.length - 1 && sortOrder !== option.value && sortOrder !== sortOptions[index+1].value
                            }"
                        >
                            <span x-text="option.shortLabel || option.label"></span>
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </header>

    <!-- Gallery Grid -->
    <main class="container mx-auto px-6 py-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Skeleton State -->
            <template x-if="loading">
                <template x-for="i in 8">
                    <div class="m3-card aspect-[16/10] skeleton"></div>
                </template>
            </template>

            <!-- Real Content -->
            <template x-for="wp in filteredWallpapers()" :key="wp.filename">
                <div class="m3-card group overflow-hidden flex flex-col" x-data="{ imgLoaded: false }">
                    <!-- Image Container (Rounded-t-m3-xl) -->
                    <div class="aspect-[16/10] w-full relative overflow-hidden cursor-pointer" @click="openLightbox(wp)">
                        <div x-show="!imgLoaded" class="absolute inset-0 skeleton"></div>
                        <img :src="wp.filename" :alt="wp.filename" 
                            decoding="async" loading="lazy"
                            @load="imgLoaded = true"
                            class="w-full h-full object-cover transition-transform duration-700 cubic-bezier(0.2, 0, 0, 1) group-hover:scale-110"
                            :class="imgLoaded ? 'opacity-100' : 'opacity-0'">
                    </div>

                    <!-- Info Area -->
                    <div class="p-6 flex items-center justify-between">
                        <div class="flex flex-col max-w-[70%]">
                            <span class="text-sm font-semibold text-m3-onSurface truncate" x-text="cleanName(wp.filename)"></span>
                            <span class="text-[10px] text-m3-onSurfaceVariant uppercase font-bold tracking-[0.1em] mt-2" x-text="formatDate(wp.mtime)"></span>
                        </div>
                        <div class="flex gap-2">
                            <template x-if="wp.wallhaven_id">
                                <a :href="'https://wallhaven.cc/w/' + wp.wallhaven_id" target="_blank" 
                                    class="w-11 h-11 flex items-center justify-center rounded-2xl bg-m3-primary/10 text-m3-primary hover:bg-m3-primaryContainer transition-all" title="Wallhaven">
                                    <i class="fa-solid fa-link"></i>
                                </a>
                            </template>
                            <a :href="wp.filename" download 
                                class="w-11 h-11 flex items-center justify-center rounded-2xl bg-m3-secondary/10 text-m3-secondary hover:bg-m3-secondaryContainer transition-all" title="Download">
                                <i class="fa fa-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="!loading && filteredWallpapers().length === 0" class="text-center py-40" x-cloak>
            <div class="bg-m3-surfaceContainer p-12 rounded-[48px] inline-block border border-m3-outline/10 shadow-xl">
                <i class="fa-solid fa-image text-6xl text-m3-outline/20 mb-8 block"></i>
                <p class="text-m3-onSurfaceVariant text-xl font-medium italic">No matches found in your collection.</p>
            </div>
        </div>
    </main>

    <!-- Lightbox (Improved M3 Dialog Style) -->
    <div x-show="lightboxOpen" 
        class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4 md:p-12"
        x-transition:enter="transition ease-out duration-400"
        x-transition:enter-start="opacity-0 backdrop-blur-none"
        x-transition:enter-end="opacity-100 backdrop-blur-md"
        @click.self="closeLightbox()"
        @keydown.escape.window="closeLightbox()"
        x-cloak>
        
        <button @click="closeLightbox()" class="absolute top-8 right-8 w-14 h-14 flex items-center justify-center bg-m3-surfaceContainerHigh/50 rounded-2xl text-m3-onSurface hover:bg-m3-primary/20 transition-all z-50 shadow-lg">
            <i class="fa fa-times text-2xl"></i>
        </button>

        <div class="relative max-w-[95vw] max-h-full flex flex-col items-center gap-8" @click.away="closeLightbox()">
            <img :src="currentWp?.filename" class="max-w-full max-h-[80vh] object-contain rounded-[32px] shadow-2xl border border-m3-outline/20">
            
            <div class="flex flex-wrap items-center justify-center gap-6 bg-m3-surfaceContainerHigh/90 backdrop-blur-xl px-10 py-5 rounded-[36px] border border-m3-outline/20 shadow-2xl">
                 <div class="flex flex-col">
                     <span class="text-sm font-bold text-m3-onSurface max-w-xs truncate" x-text="currentWp?.filename"></span>
                     <span class="text-[11px] text-m3-onSurfaceVariant font-bold uppercase tracking-wider" x-text="formatDate(currentWp?.mtime)"></span>
                 </div>
                 <div class="h-10 w-px bg-m3-outline/20 hidden sm:block"></div>
                 <div class="flex gap-4">
                     <a :href="currentWp?.filename" download class="bg-m3-primary text-m3-onPrimary px-8 py-3 rounded-2xl font-bold text-sm hover:scale-105 transition-all shadow-md">
                        Download Now
                     </a>
                     <template x-if="currentWp?.wallhaven_id">
                        <a :href="'https://wallhaven.cc/w/' + currentWp?.wallhaven_id" target="_blank" class="bg-m3-secondaryContainer text-m3-onSecondaryContainer px-8 py-3 rounded-2xl font-bold text-sm hover:scale-105 transition-all shadow-md border border-m3-outline/10">
                            Wallhaven
                        </a>
                     </template>
                 </div>
            </div>
        </div>
    </div>

    <script>
        function galleryApp() {
            return {
                wallpapers: [],
                search: '',
                sortOrder: 'newest',
                loading: true,
                lightboxOpen: false,
                currentWp: null,
                sortOptions: [
                    { label: 'Newest First', shortLabel: 'Newest', value: 'newest' },
                    { label: 'Oldest First', shortLabel: 'Oldest', value: 'oldest' },
                    { label: 'Name A-Z', shortLabel: 'A-Z', value: 'az' },
                    { label: 'Name Z-A', shortLabel: 'Z-A', value: 'za' }
                ],

                init() {
                    setTimeout(() => {
                        fetch('wallpapers.json')
                            .then(res => res.json())
                            .then(data => {
                                this.wallpapers = data;
                                this.loading = false;
                            });
                    }, 600);
                },

                filteredWallpapers() {
                    let result = this.wallpapers.filter(wp => 
                        wp.filename.toLowerCase().includes(this.search.toLowerCase())
                    );

                    if (this.sortOrder === 'newest') {
                        result.sort((a, b) => new Date(b.mtime) - new Date(a.mtime));
                    } else if (this.sortOrder === 'oldest') {
                        result.sort((a, b) => new Date(a.mtime) - new Date(b.mtime));
                    } else if (this.sortOrder === 'az') {
                        result.sort((a, b) => a.filename.localeCompare(b.filename));
                    } else if (this.sortOrder === 'za') {
                        result.sort((a, b) => b.filename.localeCompare(a.filename));
                    }

                    return result;
                },

                cleanName(name) {
                    let base = name.split('.')[0];
                    return base.length > 22 ? base.substring(0, 20) + '...' : base;
                },

                formatDate(isoString) {
                    if (!isoString) return '';
                    const date = new Date(isoString);
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                },

                openLightbox(wp) {
                    this.currentWp = wp;
                    this.lightboxOpen = true;
                    document.body.style.overflow = 'hidden';
                },

                closeLightbox() {
                    this.lightboxOpen = false;
                    document.body.style.overflow = 'auto';
                }
            }
        }
    </script>
</body>
</html>
