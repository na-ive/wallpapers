<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NA-ive Wallpaper Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --md-sys-color-primary: #c7bfff;
            --md-sys-color-on-primary: #2f285f;
            --md-sys-color-primary-container: #463f77;
            --md-sys-color-on-primary-container: #e5deff;
            --md-sys-color-secondary: #c8c3dc;
            --md-sys-color-on-secondary: #312e41;
            --md-sys-color-secondary-container: #474459;
            --md-sys-color-on-secondary-container: #e5dff9;
            --md-sys-color-surface: #141318;
            --md-sys-color-on-surface: #e5e1e9;
            --md-sys-color-surface-variant: #47464f;
            --md-sys-color-on-surface-variant: #c9c5d0;
            --md-sys-color-outline: #928f99;
            --md-sys-color-surface-container: #201f25;
            --md-sys-color-surface-container-high: #2a292f;
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .m3-card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 20px;
            transition: transform 0.2s ease, background-color 0.2s ease;
            will-change: transform;
        }

        .m3-card:hover {
            background-color: var(--md-sys-color-surface-container-high);
            transform: translateY(-2px);
        }

        .skeleton {
            background: linear-gradient(90deg, #201f25 25%, #2a292f 50%, #201f25 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: var(--md-sys-color-surface); }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: var(--md-sys-color-surface-variant); 
            border-radius: 10px;
        }

        .pill-btn {
            transition: all 0.3s ease;
        }
        .pill-btn:hover, .pill-btn.active {
            border-radius: 9999px !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        m3: {
                            primary: '#c7bfff',
                            onPrimary: '#2f285f',
                            primaryContainer: '#463f77',
                            onPrimaryContainer: '#e5deff',
                            secondary: '#c8c3dc',
                            onSecondary: '#312e41',
                            secondaryContainer: '#474459',
                            onSecondaryContainer: '#e5dff9',
                            surface: '#141318',
                            onSurface: '#e5e1e9',
                            surfaceVariant: '#47464f',
                            onSurfaceVariant: '#c9c5d0',
                            outline: '#928f99',
                            surfaceContainer: '#201f25',
                            surfaceContainerHigh: '#2a292f',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body x-data="galleryApp()" class="custom-scrollbar overflow-x-hidden">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-m3-surface/80 backdrop-blur-md border-b border-m3-surfaceVariant/20 py-3 md:py-4">
        <div class="container mx-auto px-4 flex items-center justify-between h-10 md:h-12">
            
            <!-- Left: Title/Logo -->
            <div class="flex items-center gap-2 md:gap-3 shrink-0" x-show="!searchOpen">
                <i class="fa-solid fa-images text-m3-onSurface text-lg md:text-xl"></i>
                <h1 class="text-base md:text-xl font-semibold text-m3-onSurface whitespace-nowrap">
                    <span class="md:hidden">NAWC</span>
                    <span class="hidden md:inline">NA-ive Wallpaper Collection</span>
                </h1>
            </div>

            <!-- Right: Search & Sort Tools -->
            <div class="flex items-center gap-2 md:gap-4 flex-grow justify-end" :class="searchOpen ? 'w-full' : ''">
                
                <!-- Search Bar (Expandable on Mobile, Always on Desktop) -->
                <div class="relative flex items-center transition-all duration-300" :class="searchOpen ? 'w-full' : 'w-auto'">
                    <!-- Desktop Search (Static) -->
                    <div class="hidden md:block relative w-64">
                        <input type="text" x-model="search" placeholder="Search..." 
                            class="w-full bg-m3-surfaceContainerHigh text-m3-onSurface border-none rounded-xl py-2 px-10 focus:ring-2 focus:ring-m3-primary transition-all text-sm">
                        <i class="fa fa-search absolute left-3 top-1/2 -translate-y-1/2 text-m3-onSurfaceVariant/70 text-xs"></i>
                    </div>

                    <!-- Mobile Search (Expandable) -->
                    <div class="md:hidden flex items-center gap-2 w-full" x-show="searchOpen" x-cloak x-transition>
                        <button @click="searchOpen = false; search = ''" class="p-2 text-m3-onSurfaceVariant">
                            <i class="fa fa-arrow-left"></i>
                        </button>
                        <input type="text" x-model="search" placeholder="Search wallpapers..." autofocus
                            class="w-full bg-m3-surfaceContainerHigh text-m3-onSurface border-none rounded-xl py-2 px-4 focus:ring-2 focus:ring-m3-primary text-sm">
                    </div>
                    <button @click="searchOpen = true" x-show="!searchOpen" class="md:hidden p-2 text-m3-onSurface transition-colors hover:bg-m3-surfaceVariant/20 rounded-full">
                        <i class="fa fa-search"></i>
                    </button>
                </div>

                <!-- Sort Button (Dropdown/Modal Style for Mobile, Pills for Desktop) -->
                <div class="flex items-center gap-1 shrink-0" x-show="!searchOpen">
                    <!-- Desktop Sort (Pills) -->
                    <div class="hidden md:flex gap-1 no-scrollbar overflow-x-auto">
                        <template x-for="(option, index) in sortOptions" :key="option.value">
                            <button 
                                @click="sortOrder = option.value"
                                class="pill-btn whitespace-nowrap px-4 py-2 text-xs font-semibold transition-all duration-300"
                                :class="{
                                    'bg-m3-primaryContainer text-m3-onPrimaryContainer active': sortOrder === option.value,
                                    'bg-m3-secondaryContainer text-m3-onSecondaryContainer': sortOrder !== option.value,
                                    'rounded-l-2xl rounded-r-md': index === 0 && sortOrder !== option.value,
                                    'rounded-r-2xl rounded-l-md': index === sortOptions.length - 1 && sortOrder !== option.value,
                                    'rounded-md': index !== 0 && index !== sortOptions.length - 1 && sortOrder !== option.value
                                }"
                                x-text="option.label">
                            </button>
                        </template>
                    </div>

                    <!-- Mobile Sort (Dropdown Menu) -->
                    <div class="md:hidden relative" x-data="{ open: false }">
                        <button @click="open = !open" class="p-2 text-m3-onSurface hover:bg-m3-surfaceVariant/20 rounded-full transition-colors">
                            <i class="fa-solid fa-arrow-down-wide-short"></i>
                        </button>
                        <div x-show="open" @click.away="open = false" x-cloak
                            x-transition:enter="transition ease-out duration-200"
                            x-transition:enter-start="opacity-0 scale-95"
                            x-transition:enter-end="opacity-100 scale-100"
                            class="absolute right-0 mt-2 w-40 bg-m3-surfaceContainerHigh border border-m3-surfaceVariant/30 rounded-2xl shadow-2xl z-50">
                            <div class="py-2">
                                <template x-for="option in sortOptions" :key="option.value">
                                    <button @click="sortOrder = option.value; open = false" 
                                        class="w-full text-left px-4 py-3 text-sm text-m3-onSurface hover:bg-m3-primary/10 transition-colors"
                                        :class="sortOrder === option.value ? 'bg-m3-primary/20 text-m3-primary font-bold' : ''"
                                        x-text="option.label">
                                    </button>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>

    <!-- Gallery Grid -->
    <main class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <template x-if="loading">
                <template x-for="i in 8">
                    <div class="m3-card aspect-video skeleton"></div>
                </template>
            </template>

            <template x-for="wp in filteredWallpapers()" :key="wp.filename">
                <div class="m3-card group overflow-hidden flex flex-col">
                    <div class="aspect-video w-full relative overflow-hidden cursor-pointer bg-m3-surfaceVariant/10" @click="openLightbox(wp)">
                        <img :src="wp.thumbnail" :alt="wp.filename" 
                            decoding="async" loading="lazy"
                            class="w-full h-full object-cover">
                    </div>
                    <div class="p-3 flex items-center justify-between gap-2">
                        <span class="text-[10px] md:text-xs font-medium text-m3-onSurface truncate flex-grow" x-text="cleanName(wp.filename)"></span>
                        <div class="flex gap-1 shrink-0">
                            <template x-if="wp.wallhaven_id">
                                <a :href="'https://wallhaven.cc/w/' + wp.wallhaven_id" target="_blank" 
                                    class="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center rounded-lg hover:bg-m3-primary/20 text-m3-primary transition-colors text-xs">
                                    <i class="fa-solid fa-link"></i>
                                </a>
                            </template>
                            <a :href="wp.filename" download 
                                class="w-7 h-7 md:w-8 md:h-8 flex items-center justify-center rounded-lg hover:bg-m3-secondary/20 text-m3-secondary transition-colors text-xs">
                                <i class="fa fa-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Lightbox -->
    <div x-show="lightboxOpen" 
        class="fixed inset-0 z-50 flex items-center justify-center bg-m3-surface/70 backdrop-blur-sm p-4 md:p-8"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-95"
        @click.self="closeLightbox()"
        @keydown.escape.window="closeLightbox()"
        x-cloak>
        
        <div class="relative max-w-[95vw] w-full h-full flex flex-col items-center justify-center" @click.self="closeLightbox()">
            <img :src="currentWp?.filename" class="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl border border-m3-surfaceVariant/20">
            
            <div class="mt-4 md:mt-6 flex items-center gap-2 bg-m3-surfaceContainerHigh/90 backdrop-blur-xl px-4 py-3 md:px-6 md:py-4 rounded-[28px] border border-m3-outline/20 shadow-2xl">
                 <div class="flex flex-col mr-2 md:mr-4 overflow-hidden max-w-[100px] sm:max-w-[300px]">
                     <span class="text-[10px] md:text-xs font-bold text-m3-onSurface truncate" x-text="currentWp?.filename"></span>
                 </div>
                 <div class="flex items-center gap-2">
                     <a :href="currentWp?.filename" download class="bg-m3-primary text-m3-onPrimary px-4 py-2 md:px-6 md:py-2.5 rounded-2xl font-bold text-[10px] md:text-xs hover:scale-105 transition-all">
                        Download
                     </a>
                     <template x-if="currentWp?.wallhaven_id">
                        <a :href="'https://wallhaven.cc/w/' + currentWp?.wallhaven_id" target="_blank" class="bg-m3-secondaryContainer text-m3-onSecondaryContainer px-4 py-2 md:px-6 md:py-2.5 rounded-2xl font-bold text-[10px] md:text-xs hover:scale-105 transition-all">
                            Wallhaven
                        </a>
                     </template>
                 </div>
            </div>
        </div>
    </div>

    <script>
        function galleryApp() {
            return {
                wallpapers: [],
                search: '',
                sortOrder: 'newest',
                loading: true,
                lightboxOpen: false,
                searchOpen: false,
                currentWp: null,
                sortOptions: [
                    { label: 'Newest', value: 'newest' },
                    { label: 'Oldest', value: 'oldest' },
                    { label: 'A-Z', value: 'az' },
                    { label: 'Z-A', value: 'za' }
                ],

                init() {
                    fetch('wallpapers.json')
                        .then(res => res.json())
                        .then(data => {
                            this.wallpapers = data;
                            this.loading = false;
                        });
                },

                filteredWallpapers() {
                    let result = this.wallpapers.filter(wp => 
                        wp.filename.toLowerCase().includes(this.search.toLowerCase())
                    );

                    if (this.sortOrder === 'newest') {
                        result.sort((a, b) => new Date(b.mtime) - new Date(a.mtime));
                    } else if (this.sortOrder === 'oldest') {
                        result.sort((a, b) => new Date(a.mtime) - new Date(b.mtime));
                    } else if (this.sortOrder === 'az') {
                        result.sort((a, b) => a.filename.localeCompare(b.filename));
                    } else if (this.sortOrder === 'za') {
                        result.sort((a, b) => b.filename.localeCompare(a.filename));
                    }

                    return result;
                },

                cleanName(name) {
                    let base = name.split('.')[0];
                    return base.length > 20 ? base.substring(0, 18) + '...' : base;
                },

                openLightbox(wp) {
                    this.currentWp = wp;
                    this.lightboxOpen = true;
                    document.body.style.overflow = 'hidden';
                },

                closeLightbox() {
                    this.lightboxOpen = false;
                    document.body.style.overflow = 'auto';
                }
            }
        }
    </script>
</body>
</html>
